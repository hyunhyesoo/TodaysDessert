<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" th:href="@{/css/top.css}">
  <link rel="stylesheet" th:href="@{/css/detail.css}">

</head>

<body>
  <!-- 통합 네비게이션 바 -->
  <nav class="navbar">
    <div class="navLeft">
      <a th:href="@{/}">
        <img th:src="@{/imgs/logo.png}" alt="로고" class="logo" />
      </a>
      <ul class="navMenu">
        <li><a th:href="@{/intro}" class="goIntro">홈페이지소개</a></li>
        <li><a th:href="@{/category}" class="goCategory">카테고리</a></li>
      </ul>
    </div>
    <div class="navRight">
      <div class="searchBar">
        <input type="text" placeholder="검색어 입력" class="searchInput" />
      </div>
      <div class="navIcons">
        <button class="iconBtn searchBtn" aria-label="필터"><span class="tuneIcon"></span></button>
        <button class="iconBtn userBtn" aria-label="사용자"><span class="userIcon"></span></button>
      </div>
    </div>
  </nav>

  <!-- 페이지 3단 레이아웃 래퍼 -->
  <div class="page-wrapper">
    
    <!-- 좌측 사이드바 필터 -->
    <aside class="left-sidebar">
      <h3 class="sidebar-title">카테고리 필터</h3>
      <ul class="filter-list">
        <li><label><input type="radio" name="category" value="케이크"> 케이크</label></li>
        <li><label><input type="radio" name="category" value="베이글&샌드위치"> 베이글&샌드위치</label></li>
        <li><label><input type="radio" name="category" value="베이커리"> 베이커리</label></li>
        <li><label><input type="radio" name="category" value="빙수&파르페"> 빙수&파르페</label></li>
        <li><label><input type="radio" name="category" value="아이스크림"> 아이스크림</label></li>
        <li><label><input type="radio" name="category" value="음료"> 음료</label></li>
      </ul>

      <h3 class="sidebar-title" style="margin-top: 30px;">인기 디저트 TOP5</h3>
      <ul class="top-desserts-sidebar">
        <li th:each="dessert, iterStat : ${topDesserts}">
          <a th:href="@{/detail(name=${dessert.name})}" th:text="${iterStat.count} + '위 ' + ${dessert.name}">1위 딸기생크림케이크</a>
        </li>
      </ul>
    </aside>

    <!-- 중앙 메인 콘텐츠 영역 -->
    <div class="content-area">
      <div class="mainContainer">
        <h2 class="productTitle">메뉴 상세보기</h2>

        <div class="product" th:if="${dessert != null}">
          <div class="productContent">
            <img th:src="@{'/' + ${dessert.image}}" class="productImage" th:alt="${dessert.name}" />

            <div class="productRight">
              <div class="productHeader">
                <h3 class="productName" th:text="${dessert.name}">글레이즈드 도넛</h3>
                <button class="favoriteBtn material-icons" id="favoriteBtn">star_border</button>
              </div>
              <p class="productDetail">설탕코팅을 입힌 부드러운 도넛으로, 달콤하고 쫄깃한 식감이 특징입니다.</p>

              <div class="productInfoSection">
                <div class="infoCard">
                  <span class="infoIcon material-icons">local_fire_department</span>
                  <div class="infoText">
                    <span class="infoLabel">예상 칼로리</span>
                    <span class="infoValue" th:text="${dessert.calories} + 'kcal'">350kcal</span>
                  </div>
                </div>
                <div class="infoCard">
                  <span class="infoIcon material-icons">payments</span>
                  <div class="infoText">
                    <span class="infoLabel">예상 가격</span>
                    <span class="infoValue" th:text="${dessert.price} + '원'">4,000원</span>
                  </div>
                </div>
                <div class="infoCard">
                  <span class="infoIcon material-icons">warning</span>
                  <div class="infoText">
                    <span class="infoLabel">예상 알레르기 정보</span>
                    <span class="infoValue" th:text="${dessert.allergy}">우유, 계란, 밀</span>
                  </div>
                </div>
              </div>

              <div class="productAction">
                <button class="likeBtn"><span class="material-icons">thumb_up</span> 추천하기 (<span class="likeCount">0</span>)</button>
                <button class="commentBtn"><span class="material-icons">chat</span> 댓글 작성</button>
              </div>
            </div>
          </div>

          <!-- 💬 댓글 영역 추가 -->
          <div class="commentSection hidden">
            <h3>댓글 <span class="commentCount">(0)</span></h3>
            <div class="commentInputForm">
              <div class="commentMetaInput">
                <input type="text" id="commentUser" placeholder="닉네임" class="metaInput" />
                <input type="password" id="commentPassword" placeholder="비밀번호 (4자리)" class="metaInput" maxlength="4" />
              </div>
              <textarea id="commentInput" placeholder="댓글을 입력해 주세요..."></textarea>
              <button id="submitComment">등록</button>
            </div>
            <div class="commentList" id="commentList">
              <!-- 댓글 목록이 동적으로 추가됩니다 -->
            </div>
          </div>
        </div>
        <div th:unless="${dessert != null}">
          <p>존재하지 않는 디저트입니다.</p>
        </div>
      </div>
    </div>

    <!-- 우측 최근 본 디저트 -->
    <aside class="right-sidebar">
      <h3 class="sidebar-title">최근 본 디저트</h3>
      <div id="recentViewsList" class="recent-views-list">
        <!-- JS로 채워짐 -->
        <p class="empty-msg">최근 본 디저트가 없습니다.</p>
      </div>
    </aside>

  </div>

  <script th:src="@{/js/top.js}"></script>
  <script th:src="@{/js/detail.js}"></script>
</body>

</html>
