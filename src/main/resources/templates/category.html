<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 디저트</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/top.css">
    <link rel="stylesheet" href="css/category.css">
</head>

<body>
    <!-- 통합 네비게이션 바 -->
    <nav class="navbar">
        <div class="navLeft">
            <a href="/">
                <img src="imgs/logo.png" alt="로고" class="logo" />
            </a>
            <ul class="navMenu">
                <li><a href="/intro" class="goIntro">홈페이지소개</a></li>
                <li><a href="/category" class="goCategory">카테고리</a></li>
            </ul>
        </div>
        <div class="navRight">
            <div class="searchBar">
                <input type="text" placeholder="검색어 입력" class="searchInput" />
            </div>
            <div class="navIcons">
                <button class="iconBtn searchBtn" aria-label="필터"><span class="tuneIcon"></span></button>
                <button class="iconBtn userBtn" aria-label="사용자"><span class="userIcon"></span></button>
            </div>
        </div>
    </nav>

    <!-- 페이지 3단 레이아웃 래퍼 -->
    <div class="page-wrapper">
        
        <!-- 좌측 사이드바 필터 -->
        <aside class="left-sidebar">
            <h3 class="sidebar-title">카테고리 필터</h3>
            <ul class="filter-list">
                <li><label><input type="radio" name="category" value="케이크"> 케이크</label></li>
                <li><label><input type="radio" name="category" value="베이글&샌드위치"> 베이글&샌드위치</label></li>
                <li><label><input type="radio" name="category" value="베이커리"> 베이커리</label></li>
                <li><label><input type="radio" name="category" value="빙수&파르페"> 빙수&파르페</label></li>
                <li><label><input type="radio" name="category" value="아이스크림"> 아이스크림</label></li>
                <li><label><input type="radio" name="category" value="음료"> 음료</label></li>
            </ul>

            <h3 class="sidebar-title" style="margin-top: 30px;">인기 디저트 TOP5</h3>
            <ul class="top-desserts-sidebar">
                <li><a href="#">1위 딸기생크림케이크</a></li>
                <li><a href="#">2위 자몽에이드</a></li>
                <li><a href="#">3위 소금빵</a></li>
                <li><a href="#">4위 복숭아타르트</a></li>
                <li><a href="#">5위 바나나누텔라와플</a></li>
            </ul>
        </aside>

        <!-- 중앙 메인 콘텐츠 영역 -->
        <div class="content-area">
            <section class="categorySection">
                <h2 class="sectionTitle">원하는 카테고리를 확인해보세요!</h2>
                <div class="categoryGrid">
                    <div class="categoryCard" data-id="101" data-name="케이크" data-img="imgs/케이크.png">
                        <div class="categoryIcon">
                            <img src="imgs/케이크.png" alt="케이크 아이콘">
                        </div>
                        <h3>케이크</h3>
                    </div>
                    <div class="categoryCard" data-id="102" data-name="베이글&샌드위치" data-img="imgs/베이글.png">
                        <div class="categoryIcon">
                            <img src="imgs/베이글.png" alt="베이글&샌드위치 아이콘">
                        </div>
                        <h3>베이글&샌드위치</h3>
                    </div>
                    <div class="categoryCard" data-id="103" data-name="베이커리" data-img="imgs/베이커리.png">
                        <div class="categoryIcon">
                            <img src="imgs/베이커리.png" alt="베이커리 아이콘">
                        </div>
                        <h3>베이커리</h3>
                    </div>
                    <div class="categoryCard" data-id="104" data-name="빙수&파르페" data-img="imgs/빙수.png">
                        <div class="categoryIcon">
                            <img src="imgs/빙수.png" alt="빙수&파르페 아이콘">
                        </div>
                        <h3>빙수&파르페</h3>
                    </div>
                    <div class="categoryCard" data-id="105" data-name="아이스크림" data-img="imgs/아이스크림.png">
                        <div class="categoryIcon">
                            <img src="imgs/아이스크림.png" alt="아이스크림 아이콘">
                        </div>
                        <h3>아이스크림</h3>
                    </div>
                    <div class="categoryCard" data-id="106" data-name="음료" data-img="imgs/음료.png">
                        <div class="categoryIcon">
                            <img src="imgs/음료.png" alt="음료 아이콘">
                        </div>
                        <h3>음료</h3>
                    </div>
                </div>
            </section>
        </div>

        <!-- 우측 최근 본 디저트 -->
        <aside class="right-sidebar">
            <h3 class="sidebar-title">최근 본 디저트</h3>
            <div id="recentViewsList" class="recent-views-list">
                <!-- JS로 채워짐 -->
                <p class="empty-msg">최근 본 디저트가 없습니다.</p>
            </div>
        </aside>

    </div>
    <script src="js/top.js"></script>
    <script src="js/category.js"></script>
</body>

</html>
